<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 — Predictor</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;900&family=Roboto+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gold-light:#E8C96A;--gold-dark:#9A7A2E;--navy:#0A1628;--navy-mid:#112240;--navy-light:#1A3356;--white:#F8F9FA;--grey:#8A9BB5;--grey-light:#C5CFE0;--red:#E63946;--green:#2DC653;--blue:#4FC3F7;--surface:#0D1F3C;--surface-raised:#162847;--border:rgba(201,168,76,0.2)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--navy);color:var(--white);font-family:'Inter',sans-serif;overflow-x:hidden}
nav{position:sticky;top:0;z-index:100;background:rgba(10,22,40,0.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:58px;flex-wrap:wrap;gap:4px}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:3px;color:var(--gold);white-space:nowrap}
.nav-tabs{display:flex;gap:0;flex-wrap:wrap}
.nav-tab{background:none;border:none;color:var(--grey);font-family:'Inter',sans-serif;font-size:.72rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:0 1rem;height:58px;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s}
.nav-tab:hover{color:var(--white)}
.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.nav-live{display:flex;align-items:center;gap:6px;font-size:.7rem;font-weight:700;color:var(--red);letter-spacing:1px}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--red);animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.section{display:none}
.section.active{display:block}

/* HERO */
.hero{position:relative;overflow:hidden;background:linear-gradient(135deg,#070F1E 0%,#0A1628 40%,#112240 100%);padding:4rem 2rem 3rem;text-align:center}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(201,168,76,.12) 0%,transparent 70%)}
.hero-eyebrow{font-size:.72rem;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:.8rem}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,8vw,6.5rem);line-height:.9;letter-spacing:4px;color:var(--white);margin-bottom:.5rem}
.hero-title span{color:var(--gold)}
.hero-sub{font-size:.9rem;color:var(--grey);max-width:500px;margin:.8rem auto 2rem;line-height:1.6}
.hero-stats{display:flex;justify-content:center;gap:3rem;flex-wrap:wrap;position:relative}
.hero-stat{text-align:center}
.hero-stat .num{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;color:var(--gold);line-height:1}
.hero-stat .lbl{font-size:.65rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--grey);margin-top:2px}

.container{max-width:1300px;margin:0 auto;padding:2rem}
.sec-header{display:flex;align-items:baseline;gap:1rem;margin-bottom:1.5rem}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:3px;color:var(--white)}
.sec-badge{font-size:.65rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);border:1px solid var(--gold-dark);border-radius:3px;padding:2px 8px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.card-header{padding:.8rem 1.2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:.72rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold)}
.update-banner{background:rgba(201,168,76,.1);border:1px solid var(--border);border-radius:6px;padding:.7rem 1.2rem;display:flex;align-items:center;gap:.8rem;margin-bottom:1.5rem;font-size:.8rem;color:var(--grey-light)}
.update-banner strong{color:var(--gold)}
.inner-tabs{display:flex;gap:.5rem;margin-bottom:1.5rem;flex-wrap:wrap}
.inner-tab{background:var(--surface);border:1px solid var(--border);color:var(--grey);border-radius:4px;padding:.4rem 1rem;font-size:.78rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif}
.inner-tab:hover{color:var(--white)}
.inner-tab.active{background:rgba(201,168,76,.15);border-color:var(--gold);color:var(--gold)}

/* POWER RANKINGS */
.power-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1rem}
.power-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem 1.2rem;display:flex;align-items:center;gap:1rem;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.power-card::after{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold);transform:scaleY(0);transition:transform .2s}
.power-card:hover{border-color:rgba(201,168,76,.5);transform:translateY(-2px)}
.power-card:hover::after{transform:scaleY(1)}
.power-rank{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--gold-dark);min-width:36px;text-align:center}
.power-rank.top3{color:var(--gold)}
.power-flag{font-size:2.2rem}
.power-info{flex:1}
.power-team{font-weight:700;font-size:.95rem;color:var(--white)}
.power-meta{font-size:.72rem;color:var(--grey);margin-top:2px}
.power-bar-wrap{height:3px;background:rgba(255,255,255,.08);border-radius:2px;margin-top:6px}
.power-bar{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--gold-dark),var(--gold))}
.power-right{text-align:right}
.power-win-pct{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--gold-light)}
.power-win-lbl{font-size:.6rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--grey)}

/* GROUPS */
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem}
.group-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.group-card-head{background:var(--navy-light);padding:.6rem 1rem;display:flex;align-items:center;justify-content:space-between}
.group-letter{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:2px;color:var(--gold)}
.group-status{font-size:.62rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 8px;border-radius:3px}
.status-complete{background:rgba(45,198,83,.2);color:var(--green)}
.group-table{width:100%;border-collapse:collapse}
.group-table th{font-size:.58rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--grey);padding:.5rem .8rem;text-align:center;border-bottom:1px solid var(--border)}
.group-table th:first-child{text-align:left}
.group-table td{padding:.45rem .8rem;font-size:.8rem;text-align:center;border-bottom:1px solid rgba(255,255,255,.04)}
.group-table td:first-child{text-align:left}
.group-table tr:last-child td{border-bottom:none}
.group-table tr.qualified{background:rgba(201,168,76,.06)}
.group-table tr.qualified-3{background:rgba(79,195,247,.05)}
.team-cell{display:flex;align-items:center;gap:8px}
.team-flag-emoji{font-size:1.1rem}
.team-name{font-weight:600}
.pts-cell{font-family:'Roboto Mono',monospace;font-weight:600;color:var(--gold)}
.gd-cell{font-family:'Roboto Mono',monospace;font-size:.76rem}
.qualified-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);display:inline-block;margin-right:2px}
.qualified-dot.third{background:var(--blue)}

/* ───── FIFA-STYLE BRACKET ───── */
.bracket-outer{overflow-x:auto;padding-bottom:1.5rem}
.bracket-page{min-width:1100px}
.bracket-rounds-row{display:flex;gap:0}
.br-round{display:flex;flex-direction:column;position:relative}
.br-round-hdr{text-align:center;padding:.6rem .4rem;font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:2px;color:var(--gold);background:var(--navy-light);border-bottom:1px solid var(--border);border-right:1px solid var(--border);white-space:nowrap}
.br-matches-col{display:flex;flex-direction:column;justify-content:space-around;flex:1;padding:.5rem .35rem;border-right:1px solid var(--border)}
</style>
</head>
<body>
    <nav>
        <div class="nav-logo">FIFA 2026 PREDICTOR</div>
        <div class="nav-live"><span class="live-dot"></span> LIVE BUILD</div>
    </nav>
    <div class="hero">
        <div class="hero-eyebrow">World Cup Challenge</div>
        <h1 class="hero-title">Predict the <span>Champion</span></h1>
    </div>
</body>
</html>
